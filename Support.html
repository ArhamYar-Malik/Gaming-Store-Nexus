<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arham's Gaming Store | Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white font-[Inter] antialiased flex flex-col min-h-screen">

    <!-- NAVIGATION -->
    <nav class="fixed w-full z-50 bg-white/5 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                
                <!-- Logo -->
                <a href="home.html" class="text-2xl font-extrabold tracking-tighter text-white hover:opacity-80 transition-opacity">
                    ARHAM'S<span class="text-violet-500">.GG</span>
                </a>

                <!-- Desktop Menu (Hidden on Mobile) -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="home.html" class="text-gray-300 hover:text-violet-500 transition-colors px-3 py-2 rounded-md text-sm font-medium">Home</a>
                        <a href="setup.html" class="text-gray-300 hover:text-violet-500 transition-colors px-3 py-2 rounded-md text-sm font-medium">Setup</a>
                        <a href="accessories.html" class="text-gray-300 hover:text-violet-500 transition-colors px-3 py-2 rounded-md text-sm font-medium">Accessories</a>
                        <a href="support.html" class="text-violet-500 font-bold px-3 py-2 rounded-md text-sm">Support</a>
                    </div>
                </div>

                <!-- Right Side: Cart & Mobile Menu Button -->
                <div class="flex items-center gap-4">
                    <!-- Cart Icon -->
                    <div class="relative p-2 group cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </div>

                    <!-- Mobile Menu Button (Label for Checkbox) -->
                    <label for="mobile-menu-toggle" class="md:hidden p-2 text-gray-300 hover:text-white cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </label>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Logic (Pure CSS/HTML Hack) -->
        <!-- 1. The hidden checkbox -->
        <input type="checkbox" id="mobile-menu-toggle" class="hidden peer">

        <!-- 2. The menu that appears when checkbox is checked (peer-checked:block) -->
        <div class="hidden peer-checked:block md:hidden bg-gray-900 border-b border-white/10 animation-fade-in">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="home.html" class="block text-gray-300 hover:text-violet-500 hover:bg-white/5 px-3 py-2 rounded-md text-base font-medium transition-colors">Home</a>
                <a href="setup.html" class="block text-gray-300 hover:text-violet-500 hover:bg-white/5 px-3 py-2 rounded-md text-base font-medium transition-colors">Setup</a>
                <a href="accessories.html" class="block text-gray-300 hover:text-violet-500 hover:bg-white/5 px-3 py-2 rounded-md text-base font-medium transition-colors">Accessories</a>
                <a href="support.html" class="block text-violet-500 font-bold px-3 py-2 rounded-md text-base bg-white/5">Support</a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="pt-32 pb-20 max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-4">Support Center</h1>
            <p class="text-gray-400">Need help with an order? We are here to assist.</p>
        </div>

        <div class="bg-gray-900 border border-white/10 rounded-2xl p-8 shadow-2xl">
            <!-- No JS Logic for form submission as requested -->
            <form action="#" method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
                        <input type="text" required class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all" placeholder="GamerTag123">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Phone</label>
                        <input type="tel" required class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all" placeholder="+1 (555) 000-0000">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                    <input type="email" required class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all" placeholder="you@example.com">
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-medium text-gray-400 mb-2">Message</label>
                    <textarea rows="4" required class="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all" placeholder="Describe your issue..."></textarea>
                </div>
                <button type="submit" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-4 rounded-lg transition-all transform active:scale-95 shadow-lg shadow-violet-500/20">Send Report</button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="border-t border-white/10 bg-black py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-gray-500 text-sm">&copy; 2026 Arham's Gaming Store. All rights reserved.</div>
            <div class="flex gap-6">
                <a href="#" class="text-gray-500 hover:text-violet-500 text-sm transition-colors">Instagram</a>
                <a href="#" class="text-gray-500 hover:text-violet-500 text-sm transition-colors">Twitter</a>
            </div>
        </div>
    </footer>
</body>
</html>
