<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arham's Gaming Store | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white font-[Inter] antialiased flex flex-col min-h-screen">

    <!-- NAVIGATION -->
    <nav class="fixed w-full z-50 bg-white/5 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                
                <!-- Logo -->
                <a href="home.html" class="text-2xl font-extrabold tracking-tighter text-white hover:opacity-80 transition-opacity">
                    ARHAM'S<span class="text-violet-500">.GG</span>
                </a>

                <!-- Desktop Menu (Hidden on Mobile) -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="home.html" class="text-violet-500 font-bold px-3 py-2 rounded-md text-sm">Home</a>
                        <a href="setup.html" class="text-gray-300 hover:text-violet-500 transition-colors px-3 py-2 rounded-md text-sm font-medium">Setup</a>
                        <a href="accessories.html" class="text-gray-300 hover:text-violet-500 transition-colors px-3 py-2 rounded-md text-sm font-medium">Accessories</a>
                        <a href="support.html" class="text-gray-300 hover:text-violet-500 transition-colors px-3 py-2 rounded-md text-sm font-medium">Support</a>
                    </div>
                </div>

                <!-- Right Side: Cart & Mobile Menu Button -->
                <div class="flex items-center gap-4">
                    <!-- Cart Icon -->
                    <div class="relative p-2 group cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </div>

                    <!-- Mobile Menu Button (Label for Checkbox) -->
                    <label for="mobile-menu-toggle" class="md:hidden p-2 text-gray-300 hover:text-white cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </label>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Logic (Pure CSS/HTML Hack) -->
        <!-- 1. The hidden checkbox -->
        <input type="checkbox" id="mobile-menu-toggle" class="hidden peer">

        <!-- 2. The menu that appears when checkbox is checked (peer-checked:block) -->
        <div class="hidden peer-checked:block md:hidden bg-gray-900 border-b border-white/10 animation-fade-in">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="home.html" class="block text-violet-500 font-bold px-3 py-2 rounded-md text-base bg-white/5">Home</a>
                <a href="setup.html" class="block text-gray-300 hover:text-violet-500 hover:bg-white/5 px-3 py-2 rounded-md text-base font-medium transition-colors">Setup</a>
                <a href="accessories.html" class="block text-gray-300 hover:text-violet-500 hover:bg-white/5 px-3 py-2 rounded-md text-base font-medium transition-colors">Accessories</a>
                <a href="support.html" class="block text-gray-300 hover:text-violet-500 hover:bg-white/5 px-3 py-2 rounded-md text-base font-medium transition-colors">Support</a>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 text-center overflow-hidden">
        <!-- Background Effects -->
        <div class="absolute top-0 left-1/2 w-full -translate-x-1/2 h-full z-0 pointer-events-none">
             <div class="absolute top-20 left-10 w-72 h-72 bg-violet-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-pulse"></div>
             <div class="absolute bottom-20 right-10 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
        </div>
        
        <div class="relative z-10 max-w-7xl mx-auto px-4">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6">
                Build Your Dream <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-blue-500">Machine.</span>
            </h1>
            <p class="mt-4 max-w-2xl mx-auto text-xl text-gray-400 mb-10">
                The ultimate destination for High-End PC parts, GPUs, Consoles, and elite peripherals.
            </p>
            <div class="flex justify-center gap-4">
                <a href="setup.html" class="bg-violet-600 hover:bg-violet-700 text-white px-8 py-4 rounded-full font-bold text-lg transition-all shadow-lg shadow-violet-500/25 hover:-translate-y-1">
                    Shop Setup
                </a>
                <a href="accessories.html" class="bg-white/10 hover:bg-white/20 text-white px-8 py-4 rounded-full font-bold text-lg transition-all border border-white/10">
                    Gear Up
                </a>
            </div>
        </div>
    </header>

    <!-- FOOTER -->
    <footer class="border-t border-white/10 bg-black py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-gray-500 text-sm">&copy; 2026 Arham's Gaming Store. All rights reserved.</div>
            <div class="flex gap-6">
                <a href="#" class="text-gray-500 hover:text-violet-500 text-sm transition-colors">Instagram</a>
                <a href="#" class="text-gray-500 hover:text-violet-500 text-sm transition-colors">Twitter</a>
            </div>
        </div>
    </footer>
</body>
</html>
